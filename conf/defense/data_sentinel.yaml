# DataSentinel defense configuration (DataSentinelDetector / QLoraModel)
# Sourced from: external/Open-Prompt-Injection/OpenPromptInjection/apps/DataSentinelDetector.py

model_info:
  # Base model used by QLoraModel. Must match the checkpoint the LoRA was trained on.
  name: "mistralai/Mistral-7B-v0.1"
  provider: "mistral"

params:
  max_output_tokens: 128
  # For local dev on a single GPU-constrained machine, run DataSentinel on CPU
  # to avoid large GPU allocations during model load. Set back to "cuda" on
  # a machine with sufficient VRAM.
  device: "cpu"
  temperature: 0.0
  gpus: [0]
  # Disable 4-bit quantization to avoid dtype incompatibilities with newer PyTorch.
  load_in_4bit: false
  # Path to the fine-tuned DataSentinel LoRA checkpoint.
  # Set to "" to fall back to the base model (KAD detection will be unreliable).
  # Download from the Open-Prompt-Injection repo or HuggingFace Hub.
  ft_path: ""
  seed: 42
