# Condition 3: Attack + zero-trust defense
# Full mitigation: screens feed reads, post writes, and high-risk tool calls.
# Main result — shows whether defense neutralises the attack without breaking utility.
condition: 3
defense: zero_trust
data_num: 50
seed: 42
firewalls:
  - position: on_read
    agents: all
  - position: on_write
    agents: all
  - position: on_tool_call
    tools: [send_email]
    agents: all
inject_payload: true