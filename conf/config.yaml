defaults:
  - _self_
  - simulation: condition_1  # Default to no defense
  - swarm: default
  - analysis: default
  - defense: data_sentinel

experiment_name: "hardshell_v1"
num_trials: 500             # Standardizing to your paper's requirements
num_agents: 5               # Global — same across all conditions; slices first N from swarm roster
num_benign_posts: 8         # Posts sampled per trial from data/timelines/benign.json
max_concurrency: 50         # Optimized for your Gemini RPD tier
seed: 42

directories:
  data_raw: "data/raw"
  timelines: "data/timelines"
  runs: "runs"   # root for all per-run output folders

hydra:
  run:
    dir: runs/condition_${simulation.condition}/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: runs/multirun/${now:%Y-%m-%d_%H-%M-%S}
    subdir: condition_${simulation.condition}

llm:
  provider: "gemini"
  model: "gemini-2.5-flash-lite"  # google-genai model name (no provider prefix)
  temperature: 0.0
  max_tokens: 1000