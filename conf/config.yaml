defaults:
  - _self_
  - simulation: condition_1  # Default to no defense
  - swarm: default
  - analysis: default
  - defense: data_sentinel

experiment_name: "hardshell_v1"

# World / episode configuration
# Each \"trial\" is now a multi-step world before reset.
num_worlds: 100             # Worlds per condition (formerly num_trials)
world_steps: 50             # Swarm steps per world before reset

# Backwards-compat alias for older analysis code that still references num_trials.
num_trials: ${num_worlds}

num_agents: 5               # Global — same across all conditions; slices first N from swarm roster
num_benign_posts: 8         # Posts sampled per world from data/timelines/benign.json
max_concurrency: 8          # Global LLM concurrency (see async_llm benchmark)
trial_concurrency: 1        # Worlds share one sandbox — keep at 1 unless the API supports parallel sandboxes
seed: 42

directories:
  data_raw: "data/raw"
  timelines: "data/timelines"
  runs: "runs"   # root for all per-run output folders

# Used by run_analysis.py to scope discovery + output to a specific run folder.
# Leave empty to auto-detect the latest timestamped folder under directories.runs.
# Override on the CLI: python run_analysis.py run_dir=runs/2026-03-11_14-30-00
run_dir: ""

hydra:
  run:
    dir: runs/${now:%Y-%m-%d_%H-%M-%S}/condition_${simulation.condition}
  sweep:
    dir: runs/${now:%Y-%m-%d_%H-%M-%S}
    subdir: condition_${simulation.condition}

llm:
  provider: "gemini"
  model: "gemini-2.5-flash-lite"  # google-genai model name (no provider prefix)
  temperature: 0.0
  max_tokens: 1000